[gh_post_comment]
description = "Post a comment on the GitHub thread. Defaults to whichever thread the inbound webhook arrived on (the PR for PR conversations and reviews; the issue otherwise). Pass `number` only when you need to post somewhere else."

[gh_post_comment.parameters]
body = "Markdown body of the comment."
number = "Optional issue/PR number override. Default is the inbound thread (PR for PR conversations/reviews, originating issue otherwise)."

[gh_push_branch]
description = "Push the workspace branch to origin. Uses credentials configured by the orchestrator. Before contacting the remote, runs `bun run fix` then `bun check` when the repo defines them, auto-committing any formatter diff as `style: bun run fix`. If `bun check` fails, fix the cause and call again. If the failure is pre-existing breakage on `main` that your diff did not cause, retry with `skip_checks=true` and note the bypass in any follow-up comment / PR body."

[gh_push_branch.parameters]
branch = "Optional explicit branch name; defaults to the workspace branch."
skip_checks = "Bypass `bun run fix` and `bun check` before pushing. Use ONLY when you have verified (e.g. via `git diff origin/<default-branch>..HEAD` against the failing files) that the failure is pre-existing on `main` and not caused by your diff. The dirty-tree gate still runs ‚Äî you must still commit everything first."

[gh_open_pr]
description = "Open a pull request from the workspace branch using the PR body template. Same pre-publish gate as `gh_push_branch`: runs `bun run fix` then `bun check` when the repo defines them, auto-committing formatter diffs. If `bun check` fails, fix the cause and call again. If the failure is pre-existing breakage on `main` that your diff did not cause, retry with `skip_checks=true` and document the bypass in the PR body's Verification section."

[gh_open_pr.parameters]
body = "Markdown body. MUST include the four template sections in order: `## Repro`, `## Cause`, `## Fix`, `## Verification`."
base = "Override the base branch (default: repo default)."
skip_checks = "Bypass `bun run fix` and `bun check` before opening. Use ONLY when you have verified the failure is pre-existing on `main` and not caused by your diff. When set, document it in the Verification section (e.g. `Skipped pre-publish gate: `bun check` fails on `main` due to <link to upstream issue>`)."

[gh_request_review]
description = "Request reviewers and/or add assignees on the open PR."

[repro_record]
description = "Persist a reproduction transcript (command, output, exit code) for the issue."

[repro_record.parameters]
reproduced = "True when the recorded run demonstrates the bug."

[mark_unable_to_reproduce]
description = "Close the loop without a PR: comment with diagnosis + info request, mark issue abandoned."

[fetch_issue_thread]
description = "Refetch the originating issue and its comments (use sparingly)."

[set_issue_labels]
description = "Append labels to the originating issue/PR. Never removes existing labels."

[set_issue_labels.parameters]
number = "Optional override; defaults to the originating issue."

[classify_issue]
description = "First triage step. Classify the issue, apply labels on GitHub, and pick the workflow branch (bug ‚Üí repro+fix+PR, question ‚Üí reply only, etc.). MUST be called before any other gh_* action on a new issue."

[classify_issue.parameters]
primary = "Exactly one primary classification."
priority = "Required when primary=='bug'; one of prio:p0..p3. Omit entirely (do not include the field) for any other primary ‚Äî the orchestrator silently drops a stray value rather than rejecting the call."
functional = "Zero or more functional labels. Unknown values are dropped silently; omit the field when none apply."
provider = "Only if explicitly provider-scoped; format provider:<name>. Omit entirely otherwise."
platform = "Only if platform materially affects reproduction; one of platform:linux|macos|windows|wsl. Omit entirely otherwise."
rationale = "One sentence explaining the classification."
branch_slug = "Concise kebab-case slug (1-50 chars, [a-z0-9-], no leading/trailing/double hyphen) describing the issue. Replaces the auto-generated slug in the working branch name. Provide for `bug`/`documentation`. Omit entirely for non-PR workflows (`question`, `enhancement`, `proposal`, `invalid`, `duplicate`)."

[classify_issue.next_steps]
bug = "reproduce ‚Üí diagnose ‚Üí fix ‚Üí PR"
documentation = "fix the docs and open a PR using the four-section template"
question = "answer in a single gh_post_comment; no PR, no repro"
enhancement = "post one thoughtful gh_post_comment on feasibility/scope; no PR"
proposal = "post one thoughtful gh_post_comment on feasibility/scope; no PR"
invalid = "post one explanatory gh_post_comment; no further action"
duplicate = "post one explanatory gh_post_comment; no further action"
